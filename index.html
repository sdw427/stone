<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Stone Cascade</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,sans-serif;}
html,body{touch-action:none;overflow:hidden;}
body{background:#f0ede8;display:flex;justify-content:center;padding:16px;}
#wrap{width:370px;display:flex;flex-direction:column;gap:0;user-select:none;}
#hud{display:flex;justify-content:space-between;align-items:center;padding:8px 4px 6px;}
#buoy-status{display:none;align-items:center;gap:6px;font-size:12px;color:#777;padding:0 4px 8px;}
#buoy-status.show{display:flex;}
#buoy-status .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.stat{display:flex;flex-direction:column;align-items:flex-start;}
.stat-val{font-size:22px;font-weight:600;color:#1c1c1e;line-height:1;}
.stat-lbl{font-size:11px;color:#888;margin-top:2px;}
#canvas-wrap{position:relative;width:370px;height:400px;border-radius:10px;overflow:hidden;background:#e8e4dc;}
canvas{display:block;touch-action:none;}
#msg-row{font-size:13px;color:#666;text-align:center;min-height:18px;padding:8px 0 6px;}
button{font-size:13px;padding:7px 14px;border:0.5px solid #bbb;border-radius:8px;background:transparent;color:#555;cursor:pointer;}
#new-btn{display:block;margin:0 auto;}
#overlay{position:absolute;inset:0;background:rgba(240,237,232,0.96);display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center;padding:20px;}
#overlay.show{display:flex;}
#overlay h2{font-size:20px;font-weight:600;color:#1c1c1e;}
#overlay .big{font-size:36px;font-weight:600;color:#1c1c1e;margin:4px 0;}
#overlay .sub{font-size:13px;color:#888;}
#rescue-overlay{position:absolute;inset:0;background:rgba(240,237,232,0.96);display:none;flex-direction:column;align-items:center;justify-content:center;gap:6px;text-align:center;padding:20px;}
#rescue-overlay.show{display:flex;}
#rescue-overlay h2{font-size:20px;font-weight:600;color:#1c1c1e;}
#rescue-overlay .sub{font-size:13px;color:#888;}
@media(prefers-color-scheme:dark){
  body{background:#1c1c1e;}
  #canvas-wrap{background:#262628;}
  .stat-val,#overlay h2,#overlay .big,#rescue-overlay h2{color:#fff;}
  .stat-lbl,#msg-row,#overlay .sub,#rescue-overlay .sub,#buoy-status{color:#999;}
  button{color:#aaa;border-color:#444;}
  #overlay{background:rgba(28,28,30,0.96);}
  #rescue-overlay{background:rgba(28,28,30,0.96);}
}
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <div class="stat"><span class="stat-val" id="h-score">0</span><span class="stat-lbl">score</span></div>
    <div class="stat" style="align-items:center;"><span class="stat-val" id="h-turn">1</span><span class="stat-lbl">turn</span></div>
    <div class="stat" style="align-items:flex-end;"><span class="stat-val" id="h-best">0</span><span class="stat-lbl">best</span></div>
  </div>
  <div id="buoy-status"></div>

  <div id="canvas-wrap">
    <canvas id="c" width="370" height="400"></canvas>
    <div id="overlay">
      <h2 id="ov-title">Missed!</h2>
      <div class="big" id="ov-score">0</div>
      <div class="sub" id="ov-sub">Best: 0</div>
      <button id="ov-btn" onclick="restartGame()" style="margin-top:8px;">Play again</button>
    </div>
    <div id="rescue-overlay">
      <h2>Missed!</h2>
      <div class="sub" id="rescue-sub">Sacrifice points to keep going?</div>
      <div style="display:flex;gap:10px;margin-top:10px;">
        <button id="rescue-accept" onclick="acceptRescue()" style="border-color:#2FA8C9;color:#2FA8C9;">Continue (-<span id="rescue-cost">1</span>)</button>
        <button id="rescue-decline" onclick="declineRescue()">End game</button>
      </div>
    </div>
  </div>

  <div id="msg-row">Tap one stone and swipe to break the triangle</div>
  <button id="new-btn" onclick="restartGame()">Restart</button>
</div>

<script>
const C = document.getElementById('c');
const ctx = C.getContext('2d');
const W = 370, H = 400;
const SR = 18;
const BASE_FRICTION = 0.955;
const ICE_FRICTION = 0.97;
const GRAVEL_FRICTION = 0.935;
const MAX_POWER = 17;
const CASCADE_POWER_MULT = 1.0;
const VELOCITY_WINDOW_MS = 110;
const VELOCITY_TO_POWER = 7.49;
const MIN_RELEASE_VELOCITY = 0.06;
const BASE_ZOOM = 1;
const MIN_ZOOM = 0.35;
const VIEW_MARGIN = 70;
const TERRAIN_SCALE = 220;
const TERRAIN_SEED_COUNT = 80;
const TERRAIN_MAX_DIST = 650;
const TERRAIN_REANCHOR_DIST = 320;
const DIFFICULTY_RAMP_PER_TURN = 0.0321;
const MIN_RADIUS_MULT = 0.55;
const MIN_POWER_MULT = 0.7;
const POWER_RAMP_PER_TURN = 0.02;
const TERRAIN_GROWTH_PER_TURN = 0.05;
const MAX_TERRAIN_INTENSITY_MULT = 1.8;
const BUOY_ELIGIBLE_TURN = 6;
const BUOY_SPAWN_CHANCE = 0.35;
const BUOY_MIN_DIST_FACTOR = 0.4;
const BUOY_MAX_DIST_FACTOR = 0.8;
const BUOY_BASE_RADIUS = 26;
const BUOY_TAP_PADDING = 14;
const BUOY_LIFESPAN_MS = 4000;
const FREEZE_DURATION_TURNS = 5;
const DOUBLESCORE_DURATION_TURNS = 5;
const STABILIZER_DURATION_TURNS = 6;
const STABILIZER_RATE_MULT = 0.5;
const GATE_BUILDER_PUSH = 6;

const BUOY_COLORS = {
  reset: '#2FA8C9', freeze: '#3DBE7A', shrink: '#B97FE0',
  doublescore: '#E0B82F', stabilizer: '#5B8FD9', gatebuilder: '#E08F3D',
  rescuecredit: '#D9527A',
};
const BUOY_LABELS = {
  reset: 'Reset', freeze: 'Freeze', shrink: 'Shrink',
  doublescore: 'Double Score', stabilizer: 'Stabilizer', gatebuilder: 'Gate Builder',
  rescuecredit: 'Rescue Credit',
};

let G = {};
let shuffStone=null, shuffStart=null, dragCur=null, dragHistory=[];

function dark(){ return window.matchMedia('(prefers-color-scheme:dark)').matches; }
window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change', ()=>{ terrainCacheFrame = -1; });

const STONE_COLS = [
  { base:'#7F77DD', hi:'#AFA9EC' },
  { base:'#1D9E75', hi:'#5DCAA5' },
  { base:'#D85A30', hi:'#F0997B' },
];

function getBest(){
  try { return parseInt(localStorage.getItem('stoneCascadeBest')||'0',10); } catch(e){ return 0; }
}
function setBest(v){
  try { localStorage.setItem('stoneCascadeBest', String(v)); } catch(e){}
}

function makeTerrain(seedVal, centerX, centerY){
  let s = seedVal;
  function rand(){ s = (s*1103515245+12345) & 0x7fffffff; return s/0x7fffffff; }
  const seeds = [];
  const SAFE_R = 130;
  for (let i=0;i<TERRAIN_SEED_COUNT;i++){
    const ang = rand()*Math.PI*2;
    const dist = SAFE_R + rand()*rand()*TERRAIN_MAX_DIST;
    seeds.push({
      wx: centerX + Math.cos(ang)*dist,
      wy: centerY + Math.sin(ang)*dist,
      r: 45 + rand()*75,
      val: rand()*2 - 1,
    });
  }
  return seeds;
}

function terrainIntensityMult(){
  const turn = (G && G.difficultyTurn) ? G.difficultyTurn : 1;
  return Math.min(MAX_TERRAIN_INTENSITY_MULT, 1 + (turn-1) * TERRAIN_GROWTH_PER_TURN);
}

function terrainValueAt(wx, wy){
  let total = 0, weightSum = 0;
  for (const s of G.terrain){
    const d = Math.hypot(wx-s.wx, wy-s.wy);
    const w = Math.exp(-(d*d)/(2*s.r*s.r));
    total += w * s.val;
    weightSum += w;
  }
  let raw = weightSum < 0.01 ? 0 : total;
  raw *= terrainIntensityMult();
  raw = Math.max(-1, Math.min(1, raw));
  const distFromAnchor = Math.hypot(wx-G.terrainAnchor.x, wy-G.terrainAnchor.y);
  const SAFE_R = 130, FADE_R = 230;
  if (distFromAnchor < SAFE_R) return 0;
  if (distFromAnchor < FADE_R){
    const k = (distFromAnchor - SAFE_R) / (FADE_R - SAFE_R);
    return raw * k;
  }
  return raw;
}

function frictionAtSigned(wx, wy){
  const t = terrainValueAt(wx, wy);
  if (t >= 0) return BASE_FRICTION + t * (ICE_FRICTION - BASE_FRICTION);
  return BASE_FRICTION + t * (BASE_FRICTION - GRAVEL_FRICTION);
}

function terrainColor(t){
  const clamp = Math.max(-1, Math.min(1, t));
  if (clamp >= 0){
    const lightR = 232, lightG = 228, lightB = 220;
    const iceR = 120, iceG = 185, iceB = 235;
    const k = clamp;
    return [
      Math.round(lightR + (iceR-lightR)*k),
      Math.round(lightG + (iceG-lightG)*k),
      Math.round(lightB + (iceB-lightB)*k),
    ];
  } else {
    const lightR = 232, lightG = 228, lightB = 220;
    const gravR = 215, gravG = 140, gravB = 60;
    const k = -clamp;
    return [
      Math.round(lightR + (gravR-lightR)*k),
      Math.round(lightG + (gravG-lightG)*k),
      Math.round(lightB + (gravB-lightB)*k),
    ];
  }
}

function terrainColorDark(t){
  const clamp = Math.max(-1, Math.min(1, t));
  if (clamp >= 0){
    const baseR=38, baseG=38, baseB=40;
    const iceR=30, iceG=70, iceB=110;
    const k = clamp;
    return [Math.round(baseR+(iceR-baseR)*k), Math.round(baseG+(iceG-baseG)*k), Math.round(baseB+(iceB-baseB)*k)];
  } else {
    const baseR=38, baseG=38, baseB=40;
    const gravR=95, gravG=55, gravB=15;
    const k = -clamp;
    return [Math.round(baseR+(gravR-baseR)*k), Math.round(baseG+(gravG-baseG)*k), Math.round(baseB+(gravB-baseB)*k)];
  }
}

function initGame(){
  const sp = SR * 2;
  G = {
    stones: [
      { id:0, wx:0, wy:sp*0.577, vx:0, vy:0 },
      { id:1, wx:-sp*0.5, wy:-sp*0.289, vx:0, vy:0 },
      { id:2, wx:sp*0.5, wy:-sp*0.289, vx:0, vy:0 },
    ],
    cam: { x:0, y:0, zoom:BASE_ZOOM },
    phase: 'cascade',
    score: 0,
    turn: 1,
    difficultyTurn: 1,
    lastTouched: null,
    animating: false,
    particles: [],
    floatTexts: [],
    gameOver: false,
    terrainAnchor: { x: 0, y: 0 },
    terrain: makeTerrain(Date.now() & 0x7fffffff, 0, 0),
    buoy: null,
    rescuesUsed: 0,
    freezeTurnsRemaining: 0,
    doubleScoreTurnsRemaining: 0,
    stabilizerTurnsRemaining: 0,
    rescueCredits: 0,
    pendingMissShotId: null,
  };
  shuffStone=null; shuffStart=null; dragCur=null;
  terrainCacheFrame = -1;
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('rescue-overlay').classList.remove('show');
  document.getElementById('buoy-status').classList.remove('show');
  updateHUD();
  setMsg('Tap one stone and swipe to break the triangle');
}

function updateHUD(){
  document.getElementById('h-score').textContent = G.score;
  document.getElementById('h-turn').textContent = G.turn;
  document.getElementById('h-best').textContent = getBest();
}

function setMsg(t){ document.getElementById('msg-row').textContent = t; }

function showBuoyStatus(type){
  const el = document.getElementById('buoy-status');
  const col = BUOY_COLORS[type] || BUOY_COLORS.reset;
  const label = BUOY_LABELS[type] || 'Buoy';
  el.innerHTML = `<span class="dot" style="background:${col}"></span>Last buoy: ${label}`;
  el.classList.add('show');
}

function centroid(){
  return {
    x: G.stones.reduce((s,st)=>s+st.wx,0)/3,
    y: G.stones.reduce((s,st)=>s+st.wy,0)/3,
  };
}

function maxRadiusFromCentroid(c){
  return Math.max(...G.stones.map(s => Math.hypot(s.wx-c.x, s.wy-c.y)));
}

function wx2sx(wx){ return W/2 + (wx - G.cam.x) * G.cam.zoom; }
function wy2sy(wy){ return H/2 + (wy - G.cam.y) * G.cam.zoom; }
function sx2wx(sx){ return G.cam.x + (sx - W/2) / G.cam.zoom; }
function sy2wy(sy){ return G.cam.y + (sy - H/2) / G.cam.zoom; }

function updateCamera(){
  const c = centroid();
  G.cam.x += (c.x - G.cam.x) * 0.08;
  G.cam.y += (c.y - G.cam.y) * 0.08;

  const anchorDist = Math.hypot(c.x-G.terrainAnchor.x, c.y-G.terrainAnchor.y);
  if (anchorDist > TERRAIN_REANCHOR_DIST){
    G.terrainAnchor = { x: c.x, y: c.y };
    G.terrain = makeTerrain(Date.now() & 0x7fffffff, c.x, c.y);
    terrainCacheFrame = -1;
  }

  const maxR = maxRadiusFromCentroid(c) + effectiveStoneRadius();
  const fitHalf = Math.min(W, H) / 2 - 20;
  let targetZoom = maxR > 1 ? Math.min(BASE_ZOOM, fitHalf / maxR) : BASE_ZOOM;
  targetZoom = Math.max(targetZoom, MIN_ZOOM * 0.4);
  G.cam.zoom += (targetZoom - G.cam.zoom) * 0.08;

  if (G.cam.zoom <= MIN_ZOOM + 0.001 && !G.gameOver && !G.animating){
    endGame('toofar');
  }
}

function stoneAt(sx, sy){
  let best = null, bestDist = Infinity;
  const maxR = (effectiveStoneRadius()*G.cam.zoom) + 14;
  for (const s of G.stones){
    const dx = wx2sx(s.wx)-sx, dy = wy2sy(s.wy)-sy;
    const d = Math.hypot(dx,dy);
    if (d < maxR && d < bestDist){ best = s; bestDist = d; }
  }
  return best;
}

function resolveCollision(a,b){
  const dx=b.wx-a.wx, dy=b.wy-a.wy, dist=Math.hypot(dx,dy);
  const er = effectiveStoneRadius();
  if (dist < er*2 && dist > 0.01){
    const nx=dx/dist, ny=dy/dist, ov=er*2-dist;
    a.wx-=nx*ov/2; a.wy-=ny*ov/2;
    b.wx+=nx*ov/2; b.wy+=ny*ov/2;
    const rv=a.vx-b.vx, ru=a.vy-b.vy, dot=rv*nx+ru*ny;
    if (dot>0){ const imp=dot*0.85; a.vx-=imp*nx; a.vy-=imp*ny; b.vx+=imp*nx; b.vy+=imp*ny; }
  }
}

function stepPhysics(){
  let moving=false;
  const STOP_THRESH = 0.2;
  for (const s of G.stones){
    const f = frictionAtSigned(s.wx, s.wy);
    s.vx *= f; s.vy *= f;
    if (Math.abs(s.vx) < STOP_THRESH) s.vx = 0;
    if (Math.abs(s.vy) < STOP_THRESH) s.vy = 0;
    s.wx += s.vx; s.wy += s.vy;
    if (Math.abs(s.vx) > STOP_THRESH || Math.abs(s.vy) > STOP_THRESH) moving = true;
  }
  for (let i=0;i<G.stones.length;i++)
    for (let j=i+1;j<G.stones.length;j++)
      resolveCollision(G.stones[i], G.stones[j]);

  for (const p of G.particles){ p.x+=p.vx; p.y+=p.vy; p.life-=0.06; p.vx*=0.94; p.vy*=0.94; }
  G.particles = G.particles.filter(p=>p.life>0);
  for (const ft of G.floatTexts){ ft.y-=0.5; ft.life-=0.022; }
  G.floatTexts = G.floatTexts.filter(f=>f.life>0);
  return moving;
}

function spawnParticles(wx,wy,col){
  const sx=wx2sx(wx), sy=wy2sy(wy);
  for (let i=0;i<8;i++){
    const a=Math.random()*Math.PI*2, sp=0.8+Math.random()*2;
    G.particles.push({x:sx,y:sy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,col});
  }
}

function spawnFloatText(wx,wy,text,col){
  G.floatTexts.push({x:wx2sx(wx), y:wy2sy(wy), text, col, life:1});
}

const MAX_GROWTH_FRAC = 0.8;

function growthFrac(){
  const turn = G.difficultyTurn || 1;
  const rm = Math.max(MIN_RADIUS_MULT, 1 - (turn-1) * DIFFICULTY_RAMP_PER_TURN);
  const t = (1 - rm) / (1 - MIN_RADIUS_MULT);
  return t * MAX_GROWTH_FRAC;
}

function effectiveStoneRadius(){
  return SR * (1 + growthFrac());
}

function stonePassedThrough(shot, gp1, gp2){
  const er = effectiveStoneRadius();
  const mx=(gp1.wx+gp2.wx)/2, my=(gp1.wy+gp2.wy)/2;
  const fullGap = Math.hypot(gp1.wx-gp2.wx, gp1.wy-gp2.wy);
  const postOpening = Math.max(fullGap - er*2, er*0.6);
  const scoreRadius = Math.min(postOpening/2, fullGap/2 - er*0.5);
  return Math.hypot(shot.wx-mx, shot.wy-my) < scoreRadius;
}

function rescueCost(useNumber){
  if (useNumber === 1) return 1;
  if (useNumber === 2) return 5;
  if (useNumber === 3) return 10;
  return Math.round(10 * Math.pow(1.5, useNumber - 3));
}

function endGame(reason){
  G.gameOver = true;
  const best = getBest();
  const isNew = G.score > best;
  if (isNew) setBest(G.score);
  document.getElementById('ov-title').textContent = isNew ? 'New high score!' : (reason==='toofar' ? 'Stones drifted too far!' : 'Missed!');
  document.getElementById('ov-score').textContent = G.score;
  document.getElementById('ov-sub').textContent = 'Best: ' + (isNew ? G.score : best);
  document.getElementById('overlay').classList.add('show');
  updateHUD();
}

function showRescuePrompt(cost){
  document.getElementById('rescue-sub').textContent = `Sacrifice ${cost} point${cost===1?'':'s'} to keep going?`;
  document.getElementById('rescue-cost').textContent = cost;
  document.getElementById('rescue-overlay').classList.add('show');
}

function acceptRescue(){
  const cost = rescueCost(G.rescuesUsed + 1);
  G.score = Math.max(0, G.score - cost);
  G.rescuesUsed++;
  document.getElementById('rescue-overlay').classList.remove('show');
  G.lastTouched = G.pendingMissShotId;
  G.pendingMissShotId = null;
  G.turn++;
  G.phase = 'goal';
  setMsg(`Sacrificed ${cost} point${cost===1?'':'s'} — keep going`);
  maybeSpawnBuoy();
  updateHUD();
  draw();
}

function declineRescue(){
  document.getElementById('rescue-overlay').classList.remove('show');
  G.pendingMissShotId = null;
  endGame('miss');
  draw();
}

function runAnimation(phase, shotId){
  G.animating = true;
  const goalStones = phase==='goal' ? G.stones.filter(s=>s.id!==shotId) : null;
  let scored=false, ticks=0;
  function tick(){
    updateCamera();
    const moving = stepPhysics();
    if (phase==='goal' && !scored){
      const s = G.stones.find(s=>s.id===shotId);
      if (stonePassedThrough(s, goalStones[0], goalStones[1])){
        scored = true;
        const gain = G.doubleScoreTurnsRemaining > 0 ? 2 : 1;
        G.score += gain;
        spawnParticles(s.wx, s.wy, '#7F77DD');
        spawnFloatText(s.wx, s.wy-30, gain > 1 ? '+2!' : '+1', '#534AB7');
        setMsg(gain > 1 ? 'Double score!' : 'Scored! Getting tighter…');
        updateHUD();
      }
    }
    draw();
    ticks++;
    if (moving && ticks < 500){ requestAnimationFrame(tick); return; }
    G.animating = false;
    if (phase==='cascade'){
      G.phase = 'goal';
      setMsg('Pick a stone — each lights up its own goal line');
      draw();
    } else {
      if (!scored){
        if (G.rescueCredits > 0){
          G.rescueCredits--;
          G.lastTouched = shotId;
          G.turn++;
          G.phase = 'goal';
          setMsg('Free rescue credit used — keep going');
          maybeSpawnBuoy();
          updateHUD();
          draw();
          return;
        }
        const nextCost = rescueCost(G.rescuesUsed + 1);
        if (G.score >= nextCost){
          G.pendingMissShotId = shotId;
          showRescuePrompt(nextCost);
          draw();
          return;
        }
        endGame('miss');
        draw();
        return;
      }
      if (G.freezeTurnsRemaining > 0){
        G.freezeTurnsRemaining--;
      } else if (G.stabilizerTurnsRemaining > 0){
        G.stabilizerTurnsRemaining--;
        G.difficultyTurn += STABILIZER_RATE_MULT;
      } else {
        G.difficultyTurn++;
      }
      if (G.doubleScoreTurnsRemaining > 0) G.doubleScoreTurnsRemaining--;
      G.lastTouched = shotId;
      G.turn++;
      G.phase = 'goal';
      maybeSpawnBuoy();
      updateHUD();
      draw();
    }
  }
  requestAnimationFrame(tick);
}

function fireStone(stone, vx, vy){
  stone.vx = vx; stone.vy = vy;
  if (G.phase === 'cascade'){
    G.lastTouched = stone.id;
    G.phase = 'wait';
    runAnimation('cascade', stone.id);
  } else {
    G.phase = 'wait';
    runAnimation('goal', stone.id);
  }
}

C.addEventListener('pointerdown', e=>{
  e.preventDefault();
  if (G.pendingMissShotId !== null) return;
  const r = C.getBoundingClientRect();
  const sx=(e.clientX-r.left)*(W/r.width), sy=(e.clientY-r.top)*(H/r.height);

  if (G.buoy){
    const bx = wx2sx(G.buoy.wx), by = wy2sy(G.buoy.wy);
    const tapR = Math.max(BUOY_BASE_RADIUS * G.cam.zoom, 24) + BUOY_TAP_PADDING;
    if (Math.hypot(sx-bx, sy-by) < tapR){
      const buoyWx = G.buoy.wx, buoyWy = G.buoy.wy;
      const buoyType = G.buoy.type;
      G.buoy = null;
      switch (buoyType){
        case 'freeze':
          G.freezeTurnsRemaining = FREEZE_DURATION_TURNS;
          spawnParticles(buoyWx, buoyWy, '#3DBE7A');
          spawnFloatText(buoyWx, buoyWy-12, 'Frozen!', '#2A9460');
          setMsg(`Growth paused for ${FREEZE_DURATION_TURNS} turns`);
          break;
        case 'shrink':
          G.difficultyTurn = Math.max(1, Math.round((G.difficultyTurn + 1) / 2));
          spawnParticles(buoyWx, buoyWy, '#B97FE0');
          spawnFloatText(buoyWx, buoyWy-12, 'Shrunk!', '#8B4FC4');
          setMsg('Stones shrunk back partway');
          break;
        case 'doublescore':
          G.doubleScoreTurnsRemaining = DOUBLESCORE_DURATION_TURNS;
          spawnParticles(buoyWx, buoyWy, '#E0B82F');
          spawnFloatText(buoyWx, buoyWy-12, '2x Score!', '#B8941A');
          setMsg(`Double points for ${DOUBLESCORE_DURATION_TURNS} turns`);
          break;
        case 'stabilizer':
          G.stabilizerTurnsRemaining = STABILIZER_DURATION_TURNS;
          spawnParticles(buoyWx, buoyWy, '#5B8FD9');
          spawnFloatText(buoyWx, buoyWy-12, 'Stabilized', '#3E6BB0');
          setMsg(`Growth slowed for ${STABILIZER_DURATION_TURNS} turns`);
          break;
        case 'gatebuilder': {
          const c = centroid();
          for (const st of G.stones){
            const dx = st.wx-c.x, dy = st.wy-c.y, d = Math.hypot(dx,dy);
            if (d > 0.01){ st.wx += (dx/d)*GATE_BUILDER_PUSH; st.wy += (dy/d)*GATE_BUILDER_PUSH; }
          }
          spawnParticles(buoyWx, buoyWy, '#E08F3D');
          spawnFloatText(buoyWx, buoyWy-12, 'Gates widened', '#B86B1F');
          setMsg('Gaps widened a little');
          break;
        }
        case 'rescuecredit':
          G.rescueCredits++;
          spawnParticles(buoyWx, buoyWy, '#D9527A');
          spawnFloatText(buoyWx, buoyWy-12, 'Credit banked', '#B23A5E');
          setMsg('Free rescue banked for later');
          break;
        default:
          G.difficultyTurn = 1;
          spawnParticles(buoyWx, buoyWy, '#2FA8C9');
          spawnFloatText(buoyWx, buoyWy-12, 'Reset!', '#177A94');
          setMsg('Goals reset — wide open again');
      }
      showBuoyStatus(buoyType);
      draw();
      return;
    }
  }

  if (G.animating || G.gameOver) return;
  const s = stoneAt(sx, sy);
  if (!s) return;
  if (G.phase==='goal' && s.id===G.lastTouched){ setMsg('Pick a DIFFERENT stone!'); return; }
  shuffStone = s; shuffStart = {x:sx, y:sy}; dragCur = {x:sx, y:sy};
  dragHistory = [{t: performance.now(), x: sx, y: sy}];
});

C.addEventListener('pointermove', e=>{
  if (!shuffStone) return;
  e.preventDefault();
  const r = C.getBoundingClientRect();
  dragCur = {x:(e.clientX-r.left)*(W/r.width), y:(e.clientY-r.top)*(H/r.height)};
  const now = performance.now();
  dragHistory.push({t: now, x: dragCur.x, y: dragCur.y});
  while (dragHistory.length > 1 && now - dragHistory[0].t > VELOCITY_WINDOW_MS) dragHistory.shift();
  draw();
});

function difficultyPowerMult(){
  const turn = G.difficultyTurn || 1;
  return Math.max(MIN_POWER_MULT, 1 - (turn-1) * POWER_RAMP_PER_TURN);
}

const BUOY_TYPES = ['reset', 'freeze', 'shrink', 'doublescore', 'stabilizer', 'gatebuilder', 'rescuecredit'];

function maybeSpawnBuoy(){
  if (G.buoy) return;
  if (G.difficultyTurn < BUOY_ELIGIBLE_TURN) return;
  if (Math.random() > BUOY_SPAWN_CHANCE) return;
  const c = centroid();
  const maxR = maxRadiusFromCentroid(c) + effectiveStoneRadius();
  const dist = maxR * (BUOY_MIN_DIST_FACTOR + Math.random()*(BUOY_MAX_DIST_FACTOR-BUOY_MIN_DIST_FACTOR)) + 60;
  const ang = Math.random()*Math.PI*2;
  const type = BUOY_TYPES[Math.floor(Math.random()*BUOY_TYPES.length)];
  G.buoy = { wx: c.x + Math.cos(ang)*dist, wy: c.y + Math.sin(ang)*dist, spawnedAt: Date.now(), type };
  ensureIdleLoop();
}

function buoyLifeFrac(){
  if (!G.buoy) return 0;
  const elapsed = Date.now() - G.buoy.spawnedAt;
  return Math.max(0, 1 - elapsed / BUOY_LIFESPAN_MS);
}

let idleLoopRunning = false;
function ensureIdleLoop(){
  if (idleLoopRunning) return;
  idleLoopRunning = true;
  function idleTick(){
    if (G.buoy && !G.animating){
      if (buoyLifeFrac() <= 0){
        G.buoy = null;
      } else {
        draw();
      }
    }
    if (G.buoy){
      requestAnimationFrame(idleTick);
    } else {
      idleLoopRunning = false;
    }
  }
  requestAnimationFrame(idleTick);
}

C.addEventListener('pointerup', e=>{
  if (!shuffStone || !shuffStart) return;
  const r = C.getBoundingClientRect();
  const sx=(e.clientX-r.left)*(W/r.width), sy=(e.clientY-r.top)*(H/r.height);
  const now = performance.now();
  dragHistory.push({t: now, x: sx, y: sy});
  while (dragHistory.length > 1 && now - dragHistory[0].t > VELOCITY_WINDOW_MS) dragHistory.shift();

  const windowStart = dragHistory[0];
  const dx = sx - windowStart.x, dy = sy - windowStart.y;
  const dt = Math.max(1, now - windowStart.t);
  const dist = Math.hypot(dx, dy);
  const velocity = dist / dt;

  if (velocity > MIN_RELEASE_VELOCITY && dist > 4){
    const mult = G.phase==='cascade' ? CASCADE_POWER_MULT : 1;
    const power = Math.min(velocity * VELOCITY_TO_POWER, MAX_POWER) * mult * difficultyPowerMult();
    fireStone(shuffStone, (dx/dist)*power, (dy/dist)*power);
  }
  shuffStone=null; shuffStart=null; dragCur=null; dragHistory=[];
});

let terrainCacheCanvas = null, terrainCacheCtx = null, terrainCacheFrame = -1;
let frameCounter = 0;

function drawTerrain(){
  if (!terrainCacheCanvas){
    terrainCacheCanvas = document.createElement('canvas');
    terrainCacheCanvas.width = W; terrainCacheCanvas.height = H;
    terrainCacheCtx = terrainCacheCanvas.getContext('2d');
  }
  if (frameCounter - terrainCacheFrame >= 3 || terrainCacheFrame === -1){
    const cell = 28;
    for (let sx=0; sx<W; sx+=cell){
      for (let sy=0; sy<H; sy+=cell){
        const wx = sx2wx(sx+cell/2), wy = sy2wy(sy+cell/2);
        const t = terrainValueAt(wx, wy);
        const rgb = dark() ? terrainColorDark(t) : terrainColor(t);
        terrainCacheCtx.fillStyle = `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;
        terrainCacheCtx.fillRect(sx, sy, cell+1, cell+1);
      }
    }
    terrainCacheFrame = frameCounter;
  }
  ctx.drawImage(terrainCacheCanvas, 0, 0);
}

function drawGrid(){
  const gs = 40 * G.cam.zoom;
  const offx = (((W/2 - G.cam.x*G.cam.zoom) % gs) + gs) % gs;
  const offy = (((H/2 - G.cam.y*G.cam.zoom) % gs) + gs) % gs;
  ctx.strokeStyle = dark() ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.05)';
  ctx.lineWidth = 0.5;
  for (let x=offx-gs; x<=W+gs; x+=gs){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y=offy-gs; y<=H+gs; y+=gs){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
}

function draw(){
  frameCounter++;
  ctx.clearRect(0,0,W,H);
  drawTerrain();
  drawGrid();

  if (G.phase==='goal'){
    const candidates = G.stones.filter(s => s.id !== G.lastTouched);
    for (const shootStone of candidates){
      const gp = G.stones.filter(s => s.id !== shootStone.id);
      const isActive = shuffStone && shuffStone.id === shootStone.id;
      ctx.save();
      ctx.setLineDash([5,5]);
      ctx.strokeStyle = isActive
        ? (dark() ? 'rgba(255,255,255,0.55)' : 'rgba(0,0,0,0.4)')
        : (dark() ? 'rgba(255,255,255,0.18)' : 'rgba(0,0,0,0.12)');
      ctx.lineWidth = isActive ? 2 : 1.5;
      ctx.beginPath();
      ctx.moveTo(wx2sx(gp[0].wx), wy2sy(gp[0].wy));
      ctx.lineTo(wx2sx(gp[1].wx), wy2sy(gp[1].wy));
      ctx.stroke();
      ctx.restore();
    }
  }

  if (G.buoy){
    const bx = wx2sx(G.buoy.wx), by = wy2sy(G.buoy.wy);
    const lifeFrac = buoyLifeFrac();
    const urgency = lifeFrac < 0.3;
    const pulseSpeed = urgency ? 90 : 280;
    const pulse = 1 + Math.sin(Date.now()/pulseSpeed) * (urgency ? 0.18 : 0.1);
    const sizeFrac = 0.25 + lifeFrac*0.75;
    const br = BUOY_BASE_RADIUS * G.cam.zoom * sizeFrac * pulse;
    const col = BUOY_COLORS[G.buoy.type] || BUOY_COLORS.reset;
    const colFill = col + '2E';
    const colFaint = col + '59';
    ctx.save();
    ctx.globalAlpha = 0.55 + lifeFrac*0.45;
    ctx.fillStyle = colFill;
    ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = col;
    ctx.lineWidth = 2.5;
    ctx.setLineDash([]);
    ctx.beginPath(); ctx.arc(bx, by, br*0.6, 0, Math.PI*2); ctx.stroke();
    ctx.strokeStyle = colFaint;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(bx, by, BUOY_BASE_RADIUS*G.cam.zoom + 6, -Math.PI/2, -Math.PI/2 + lifeFrac*Math.PI*2);
    ctx.stroke();
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(bx, by, 4, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  for (const p of G.particles){
    ctx.save(); ctx.globalAlpha = p.life; ctx.fillStyle = p.col;
    ctx.beginPath(); ctx.arc(p.x, p.y, 4*p.life, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
  for (const ft of G.floatTexts){
    ctx.save(); ctx.globalAlpha = ft.life; ctx.fillStyle = ft.col;
    ctx.font = '600 18px system-ui'; ctx.textAlign = 'center';
    ctx.fillText(ft.text, ft.x, ft.y);
    ctx.restore();
  }

  const r = effectiveStoneRadius() * G.cam.zoom;
  for (const s of G.stones){
    const sx = wx2sx(s.wx), sy = wy2sy(s.wy);
    const isLast = s.id === G.lastTouched;
    const isSel = shuffStone && s.id === shuffStone.id;
    const col = isSel ? STONE_COLS[s.id].hi : STONE_COLS[s.id].base;
    ctx.save();
    ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2);
    ctx.fillStyle = col; ctx.fill();
    if (isLast){
      ctx.setLineDash([3,3]);
      ctx.strokeStyle = dark() ? 'rgba(255,255,255,0.35)' : 'rgba(0,0,0,0.25)';
      ctx.lineWidth = 2; ctx.stroke();
    }
    if (G.phase==='goal' && !isLast && !G.animating){
      ctx.setLineDash([]);
      ctx.strokeStyle = dark() ? 'rgba(255,255,255,0.55)' : 'rgba(0,0,0,0.4)';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(sx, sy, r+6, 0, Math.PI*2); ctx.stroke();
    }
    if (r > 7){
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.font = '600 ' + Math.max(9, Math.round(11*G.cam.zoom)) + 'px system-ui';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(String.fromCharCode(65+s.id), sx, sy);
    }
    ctx.restore();
  }

  if (shuffStone && shuffStart && dragCur && dragHistory.length > 1){
    const now = performance.now();
    const windowStart = dragHistory[0];
    const dx = dragCur.x - windowStart.x, dy = dragCur.y - windowStart.y;
    const dt = Math.max(1, now - windowStart.t);
    const dist = Math.hypot(dx, dy);
    const velocity = dist / dt;
    if (velocity > MIN_RELEASE_VELOCITY && dist > 4){
      const pw = Math.min(velocity * VELOCITY_TO_POWER, MAX_POWER);
      const nx = dx/dist, ny = dy/dist;
      const sx = wx2sx(shuffStone.wx), sy = wy2sy(shuffStone.wy);
      ctx.save();
      ctx.strokeStyle = dark() ? 'rgba(255,255,255,0.55)' : 'rgba(0,0,0,0.45)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.lineTo(sx+nx*pw*6, sy+ny*pw*6);
      ctx.moveTo(sx+nx*pw*6-ny*5, sy+ny*pw*6+nx*5);
      ctx.lineTo(sx+nx*pw*6, sy+ny*pw*6);
      ctx.lineTo(sx+nx*pw*6+ny*5, sy+ny*pw*6-nx*5);
      ctx.stroke();
      ctx.restore();
    }
  }

  if (G.cam.zoom < BASE_ZOOM * 0.7 && !G.gameOver){
    ctx.save();
    ctx.fillStyle = dark() ? 'rgba(255,255,255,0.4)' : 'rgba(0,0,0,0.35)';
    ctx.font = '500 11px system-ui';
    ctx.textAlign = 'right';
    ctx.fillText('Spreading out…', W-10, 18);
    ctx.restore();
  }
}

function restartGame(){
  initGame();
  draw();
}

restartGame();
</script>
