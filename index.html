<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Stone Cascade</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,sans-serif;}
body{background:#f0ede8;display:flex;justify-content:center;padding:16px;}
#wrap{width:370px;display:flex;flex-direction:column;gap:0;user-select:none;}
#hud{display:flex;justify-content:space-between;align-items:center;padding:8px 4px 6px;}
.stat{display:flex;flex-direction:column;align-items:flex-start;}
.stat-val{font-size:22px;font-weight:600;color:#1c1c1e;line-height:1;}
.stat-lbl{font-size:11px;color:#888;margin-top:2px;}
#canvas-wrap{position:relative;width:370px;height:400px;border-radius:10px;overflow:hidden;background:#e8e4dc;}
canvas{display:block;touch-action:none;}
#msg-row{font-size:13px;color:#666;text-align:center;min-height:18px;padding:8px 0 6px;}
button{font-size:13px;padding:7px 14px;border:0.5px solid #bbb;border-radius:8px;background:transparent;color:#555;cursor:pointer;}
#new-btn{display:block;margin:0 auto;}
#overlay{position:absolute;inset:0;background:rgba(240,237,232,0.96);display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center;padding:20px;}
#overlay.show{display:flex;}
#overlay h2{font-size:20px;font-weight:600;color:#1c1c1e;}
#overlay .big{font-size:36px;font-weight:600;color:#1c1c1e;margin:4px 0;}
#overlay .sub{font-size:13px;color:#888;}
@media(prefers-color-scheme:dark){
  body{background:#1c1c1e;}
  #canvas-wrap{background:#262628;}
  .stat-val,#overlay h2,#overlay .big{color:#fff;}
  .stat-lbl,#msg-row,#overlay .sub{color:#999;}
  button{color:#aaa;border-color:#444;}
  #overlay{background:rgba(28,28,30,0.96);}
}
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <div class="stat"><span class="stat-val" id="h-score">0</span><span class="stat-lbl">score</span></div>
    <div class="stat" style="align-items:center;"><span class="stat-val" id="h-turn">1</span><span class="stat-lbl">turn</span></div>
    <div class="stat" style="align-items:flex-end;"><span class="stat-val" id="h-best">0</span><span class="stat-lbl">best</span></div>
  </div>

  <div id="canvas-wrap">
    <canvas id="c" width="370" height="400"></canvas>
    <div id="overlay">
      <h2 id="ov-title">Missed!</h2>
      <div class="big" id="ov-score">0</div>
      <div class="sub" id="ov-sub">Best: 0</div>
      <button id="ov-btn" onclick="restartGame()" style="margin-top:8px;">Play again</button>
    </div>
  </div>

  <div id="msg-row">Tap one stone and swipe to break the triangle</div>
  <button id="new-btn" onclick="restartGame()">Restart</button>
</div>

<script>
const C = document.getElementById('c');
const ctx = C.getContext('2d');
const W = 370, H = 400;
const SR = 18;
const GROWTH_START_TURN = 2;   // turn 1 (the break) stays at base size
const GROWTH_CAP_TURN = 16;    // 15 turns after the break, growth plateaus
const GROWTH_MAX_MULT = 1.8;   // +80% size at cap, per spec
function effectiveStoneRadius(){
  const turn = G.turn;
  if (turn <= GROWTH_START_TURN) return SR;
  const span = GROWTH_CAP_TURN - GROWTH_START_TURN;
  const progress = Math.min(1, (turn - GROWTH_START_TURN) / span);
  return SR * (1 + (GROWTH_MAX_MULT - 1) * progress);
}
const BASE_FRICTION = 0.978;
const ICE_FRICTION = 0.988;
const GRAVEL_FRICTION = 0.945;
const MAX_POWER = 11;
const MIN_SWIPE_VEL = 0.27; // px/ms — at or below this, shot is at minimum power. Tune to taste.
const MAX_SWIPE_VEL = 2.27; // px/ms — at or above this, shot is at MAX_POWER. Tune to taste.
const VEL_WINDOW_MS = 80;   // how far back we look to judge "current" finger speed, so a slow drag finished by a fast flick reads as fast
const CASCADE_POWER_MULT = 1.4;
const BASE_ZOOM = 1;
const MIN_ZOOM = 0.35;
const VIEW_MARGIN = 70;
const TERRAIN_SCALE = 220;
const TERRAIN_SEED_COUNT = 60;
const STEP_MS = 1000/60; // fixed timestep per spec section 5.1/9 — simulation must not depend on display refresh rate
const MAX_STEPS_PER_FRAME = 8; // clamp to avoid spiral-of-death if a frame stalls (tab backgrounded, etc.)

let G = {};
let shuffStone=null, shuffStart=null, dragCur=null, dragHist=[];

function pushDragPoint(x, y){
  const t = performance.now();
  dragHist.push({x, y, t});
  while (dragHist.length > 1 && t - dragHist[0].t > VEL_WINDOW_MS) dragHist.shift();
}

function recentSwipeVelocity(){
  // px/ms over the recent window only, so a slow drag ending in a fast flick reads as fast, not averaged down
  if (dragHist.length < 2) return 0;
  const first = dragHist[0], last = dragHist[dragHist.length-1];
  const dt = last.t - first.t;
  const dist = Math.hypot(last.x-first.x, last.y-first.y);
  if (dt < 8){
    // Too little time data to trust (sparse touch events on a fast flick).
    // Fall back to total drag distance/time from the very start of the gesture instead of reading this as zero.
    if (!shuffStart || !shuffStart.t) return 0;
    const totalDt = last.t - shuffStart.t;
    if (totalDt < 1) return 0;
    const totalDist = Math.hypot(last.x-shuffStart.x, last.y-shuffStart.y);
    return totalDist / totalDt;
  }
  return dist / dt;
}

function velocityToPower(vel){
  const clamped = Math.max(MIN_SWIPE_VEL, Math.min(MAX_SWIPE_VEL, vel));
  const t = (clamped - MIN_SWIPE_VEL) / (MAX_SWIPE_VEL - MIN_SWIPE_VEL);
  return t * MAX_POWER;
}

function dark(){ return window.matchMedia('(prefers-color-scheme:dark)').matches; }

const STONE_COLS = [
  { base:'#7F77DD', hi:'#AFA9EC' },
  { base:'#1D9E75', hi:'#5DCAA5' },
  { base:'#D85A30', hi:'#F0997B' },
];

function getBest(){
  try { return parseInt(localStorage.getItem('stoneCascadeBest')||'0',10); } catch(e){ return 0; }
}
function setBest(v){
  try { localStorage.setItem('stoneCascadeBest', String(v)); } catch(e){}
}

function makeTerrain(seedVal){
  let s = seedVal;
  function rand(){ s = (s*1103515245+12345) & 0x7fffffff; return s/0x7fffffff; }
  const seeds = [];
  const SAFE_R = 130;
  for (let i=0;i<TERRAIN_SEED_COUNT;i++){
    const ang = rand()*Math.PI*2;
    const dist = SAFE_R + rand()*rand()*2200;
    seeds.push({
      wx: Math.cos(ang)*dist,
      wy: Math.sin(ang)*dist,
      r: 60 + rand()*140,
      val: rand()*2 - 1,
    });
  }
  return seeds;
}

function terrainValueAt(wx, wy){
  let total = 0, weightSum = 0;
  for (const s of G.terrain){
    const d = Math.hypot(wx-s.wx, wy-s.wy);
    const w = Math.exp(-(d*d)/(2*s.r*s.r));
    total += w * s.val;
    weightSum += w;
  }
  let raw = weightSum < 0.01 ? 0 : total;
  raw = Math.max(-1, Math.min(1, raw));
  const distFromOrigin = Math.hypot(wx, wy);
  const SAFE_R = 130, FADE_R = 230;
  if (distFromOrigin < SAFE_R) return 0;
  if (distFromOrigin < FADE_R){
    const k = (distFromOrigin - SAFE_R) / (FADE_R - SAFE_R);
    return raw * k;
  }
  return raw;
}

function frictionAtSigned(wx, wy){
  const t = terrainValueAt(wx, wy);
  if (t >= 0) return BASE_FRICTION + t * (ICE_FRICTION - BASE_FRICTION);
  return BASE_FRICTION + t * (BASE_FRICTION - GRAVEL_FRICTION);
}

function terrainColor(t){
  const clamp = Math.max(-1, Math.min(1, t));
  if (clamp >= 0){
    const lightR = 232, lightG = 228, lightB = 220;
    const iceR = 120, iceG = 185, iceB = 235;
    const k = clamp;
    return [
      Math.round(lightR + (iceR-lightR)*k),
      Math.round(lightG + (iceG-lightG)*k),
      Math.round(lightB + (iceB-lightB)*k),
    ];
  } else {
    const lightR = 232, lightG = 228, lightB = 220;
    const gravR = 130, gravG = 128, gravB = 120;
    const k = -clamp;
    return [
      Math.round(lightR + (gravR-lightR)*k),
      Math.round(lightG + (gravG-lightG)*k),
      Math.round(lightB + (gravB-lightB)*k),
    ];
  }
}

function terrainColorDark(t){
  const clamp = Math.max(-1, Math.min(1, t));
  if (clamp >= 0){
    const baseR=38, baseG=38, baseB=40;
    const iceR=30, iceG=70, iceB=110;
    const k = clamp;
    return [Math.round(baseR+(iceR-baseR)*k), Math.round(baseG+(iceG-baseG)*k), Math.round(baseB+(iceB-baseB)*k)];
  } else {
    const baseR=38, baseG=38, baseB=40;
    const gravR=20, gravG=20, gravB=18;
    const k = -clamp;
    return [Math.round(baseR+(gravR-baseR)*k), Math.round(baseG+(gravG-baseG)*k), Math.round(baseB+(gravB-baseB)*k)];
  }
}

function initGame(){
  const sp = SR * 2;
  G = {
    stones: [
      { id:0, wx:0, wy:sp*0.577, vx:0, vy:0 },
      { id:1, wx:-sp*0.5, wy:-sp*0.289, vx:0, vy:0 },
      { id:2, wx:sp*0.5, wy:-sp*0.289, vx:0, vy:0 },
    ],
    cam: { x:0, y:0, zoom:BASE_ZOOM },
    phase: 'cascade',
    score: 0,
    turn: 1,
    lastTouched: null,
    animating: false,
    particles: [],
    floatTexts: [],
    gameOver: false,
    terrain: makeTerrain(Date.now() & 0x7fffffff),
  };
  shuffStone=null; shuffStart=null; dragCur=null; dragHist=[];
  document.getElementById('overlay').classList.remove('show');
  updateHUD();
  setMsg('Tap one stone and swipe to break the triangle');
}

function updateHUD(){
  document.getElementById('h-score').textContent = G.score;
  document.getElementById('h-turn').textContent = G.turn;
  document.getElementById('h-best').textContent = getBest();
}

function setMsg(t){ document.getElementById('msg-row').textContent = t; }

function centroid(){
  return {
    x: G.stones.reduce((s,st)=>s+st.wx,0)/3,
    y: G.stones.reduce((s,st)=>s+st.wy,0)/3,
  };
}

function maxRadiusFromCentroid(c){
  return Math.max(...G.stones.map(s => Math.hypot(s.wx-c.x, s.wy-c.y)));
}

function wx2sx(wx){ return W/2 + (wx - G.cam.x) * G.cam.zoom; }
function wy2sy(wy){ return H/2 + (wy - G.cam.y) * G.cam.zoom; }
function sx2wx(sx){ return G.cam.x + (sx - W/2) / G.cam.zoom; }
function sy2wy(sy){ return G.cam.y + (sy - H/2) / G.cam.zoom; }

function updateCamera(){
  const c = centroid();
  G.cam.x += (c.x - G.cam.x) * 0.08;
  G.cam.y += (c.y - G.cam.y) * 0.08;

  const maxR = maxRadiusFromCentroid(c) + effectiveStoneRadius();
  const fitHalf = Math.min(W, H) / 2 - 20;
  let targetZoom = maxR > 1 ? Math.min(BASE_ZOOM, fitHalf / maxR) : BASE_ZOOM;
  targetZoom = Math.max(targetZoom, MIN_ZOOM * 0.4);
  G.cam.zoom += (targetZoom - G.cam.zoom) * 0.08;

  if (G.cam.zoom <= MIN_ZOOM + 0.001 && !G.gameOver && !G.animating){
    endGame('toofar');
  }
}

function stoneAt(sx, sy){
  let best = null, bestDist = Infinity;
  const maxR = (effectiveStoneRadius()*G.cam.zoom) + 14;
  for (const s of G.stones){
    const dx = wx2sx(s.wx)-sx, dy = wy2sy(s.wy)-sy;
    const d = Math.hypot(dx,dy);
    if (d < maxR && d < bestDist){ best = s; bestDist = d; }
  }
  return best;
}

function resolveCollision(a,b){
  const dx=b.wx-a.wx, dy=b.wy-a.wy, dist=Math.hypot(dx,dy);
  const r2 = effectiveStoneRadius()*2;
  if (dist < r2 && dist > 0.01){
    const nx=dx/dist, ny=dy/dist, ov=r2-dist;
    a.wx-=nx*ov/2; a.wy-=ny*ov/2;
    b.wx+=nx*ov/2; b.wy+=ny*ov/2;
    const rv=a.vx-b.vx, ru=a.vy-b.vy, dot=rv*nx+ru*ny;
    if (dot>0){ const imp=dot*0.85; a.vx-=imp*nx; a.vy-=imp*ny; b.vx+=imp*nx; b.vy+=imp*ny; }
  }
}

function stepPhysics(){
  let moving=false;
  for (const s of G.stones){
    const f = frictionAtSigned(s.wx, s.wy);
    s.vx *= f; s.vy *= f;
    if (Math.abs(s.vx) < 0.03) s.vx = 0;
    if (Math.abs(s.vy) < 0.03) s.vy = 0;
    s.wx += s.vx; s.wy += s.vy;
    if (Math.abs(s.vx) > 0.03 || Math.abs(s.vy) > 0.03) moving = true;
  }
  for (let i=0;i<G.stones.length;i++)
    for (let j=i+1;j<G.stones.length;j++)
      resolveCollision(G.stones[i], G.stones[j]);

  for (const p of G.particles){ p.x+=p.vx; p.y+=p.vy; p.life-=0.06; p.vx*=0.94; p.vy*=0.94; }
  G.particles = G.particles.filter(p=>p.life>0);
  for (const ft of G.floatTexts){ ft.y-=0.5; ft.life-=0.022; }
  G.floatTexts = G.floatTexts.filter(f=>f.life>0);
  return moving;
}

function spawnParticles(wx,wy,col){
  const sx=wx2sx(wx), sy=wy2sy(wy);
  for (let i=0;i<8;i++){
    const a=Math.random()*Math.PI*2, sp=0.8+Math.random()*2;
    G.particles.push({x:sx,y:sy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,col});
  }
}

function spawnFloatText(wx,wy,text,col){
  G.floatTexts.push({x:wx2sx(wx), y:wy2sy(wy), text, col, life:1});
}

function stonePassedThrough(shot, gp1, gp2){
  const mx=(gp1.wx+gp2.wx)/2, my=(gp1.wy+gp2.wy)/2;
  const fullGap = Math.hypot(gp1.wx-gp2.wx, gp1.wy-gp2.wy);
  const r = effectiveStoneRadius();
  const postOpening = Math.max(fullGap - r*2, r*0.6);
  const scoreRadius = Math.min(postOpening/2, fullGap/2 - r*0.5);
  return Math.hypot(shot.wx-mx, shot.wy-my) < scoreRadius;
}

function endGame(reason){
  G.gameOver = true;
  const best = getBest();
  const isNew = G.score > best;
  if (isNew) setBest(G.score);
  document.getElementById('ov-title').textContent = isNew ? 'New high score!' : (reason==='toofar' ? 'Stones drifted too far!' : 'Missed!');
  document.getElementById('ov-score').textContent = G.score;
  document.getElementById('ov-sub').textContent = 'Best: ' + (isNew ? G.score : best);
  document.getElementById('overlay').classList.add('show');
  updateHUD();
}

function runAnimation(phase, shotId){
  G.animating = true;
  const goalStones = phase==='goal' ? G.stones.filter(s=>s.id!==shotId) : null;
  let scored=false, simSteps=0;
  const MAX_SIM_STEPS = 500; // same total-step ceiling as before, now counted in fixed sim steps rather than frames
  let lastTime = null;
  let accumulator = 0;
  let stillMoving = true; // assume moving until a step says otherwise; avoids stopping on a frame with zero steps

  function tick(now){
    if (lastTime === null) lastTime = now;
    let frameMs = now - lastTime;
    lastTime = now;
    if (frameMs > 250) frameMs = 250; // clamp huge gaps (tab backgrounded) instead of dumping them into the sim
    accumulator += frameMs;

    let stepsThisFrame = 0;
    while (accumulator >= STEP_MS && simSteps < MAX_SIM_STEPS && stepsThisFrame < MAX_STEPS_PER_FRAME){
      updateCamera();
      stillMoving = stepPhysics();
      if (phase==='goal' && !scored){
        const s = G.stones.find(s=>s.id===shotId);
        if (stonePassedThrough(s, goalStones[0], goalStones[1])){
          scored = true;
          G.score++;
          spawnParticles(s.wx, s.wy, '#7F77DD');
          spawnFloatText(s.wx, s.wy-30, '+1', '#534AB7');
          setMsg('Scored!');
          updateHUD();
        }
      }
      accumulator -= STEP_MS;
      simSteps++;
      stepsThisFrame++;
    }

    draw();
    if (stillMoving && simSteps < MAX_SIM_STEPS){ requestAnimationFrame(tick); return; }
    G.animating = false;
    if (phase==='cascade'){
      G.phase = 'goal';
      setMsg('Flick a DIFFERENT stone through the goal posts');
      draw();
    } else {
      if (!scored){
        endGame('miss');
        draw();
        return;
      }
      setMsg('Push a different stone through the next goal');
      G.lastTouched = shotId;
      G.turn++;
      G.phase = 'goal';
      updateHUD();
      draw();
    }
  }
  requestAnimationFrame(tick);
}

function fireStone(stone, vx, vy){
  stone.vx = vx; stone.vy = vy;
  if (G.phase === 'cascade'){
    G.lastTouched = stone.id;
    G.phase = 'wait';
    runAnimation('cascade', stone.id);
  } else {
    G.phase = 'wait';
    runAnimation('goal', stone.id);
  }
}

C.addEventListener('pointerdown', e=>{
  if (G.animating || G.gameOver) return;
  e.preventDefault();
  const r = C.getBoundingClientRect();
  const sx=(e.clientX-r.left)*(W/r.width), sy=(e.clientY-r.top)*(H/r.height);
  const s = stoneAt(sx, sy);
  if (!s) return;
  if (G.phase==='goal' && s.id===G.lastTouched){ setMsg('Pick a DIFFERENT stone!'); return; }
  shuffStone = s; shuffStart = {x:sx, y:sy, t:performance.now()}; dragCur = {x:sx, y:sy};
  dragHist = [];
  pushDragPoint(sx, sy);
});

C.addEventListener('pointermove', e=>{
  if (!shuffStone) return;
  e.preventDefault();
  const r = C.getBoundingClientRect();
  dragCur = {x:(e.clientX-r.left)*(W/r.width), y:(e.clientY-r.top)*(H/r.height)};
  pushDragPoint(dragCur.x, dragCur.y);
  draw();
});

C.addEventListener('pointerup', e=>{
  if (!shuffStone || !shuffStart) return;
  const r = C.getBoundingClientRect();
  const sx=(e.clientX-r.left)*(W/r.width), sy=(e.clientY-r.top)*(H/r.height);
  pushDragPoint(sx, sy);
  const dx=sx-shuffStart.x, dy=sy-shuffStart.y, len=Math.hypot(dx,dy);
  const vel = recentSwipeVelocity();
  if (len > 5 && vel > 0.001){
    const mult = G.phase==='cascade' ? CASCADE_POWER_MULT : 1;
    const power = velocityToPower(vel) * mult;
    fireStone(shuffStone, (dx/len)*power, (dy/len)*power);
  }
  shuffStone=null; shuffStart=null; dragCur=null; dragHist=[];
});

function drawTerrain(){
  const cell = 14;
  for (let sx=0; sx<W; sx+=cell){
    for (let sy=0; sy<H; sy+=cell){
      const wx = sx2wx(sx+cell/2), wy = sy2wy(sy+cell/2);
      const t = terrainValueAt(wx, wy);
      const rgb = dark() ? terrainColorDark(t) : terrainColor(t);
      ctx.fillStyle = `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;
      ctx.fillRect(sx, sy, cell+1, cell+1);
    }
  }
}

function drawGrid(){
  const gs = 40 * G.cam.zoom;
  const offx = (((W/2 - G.cam.x*G.cam.zoom) % gs) + gs) % gs;
  const offy = (((H/2 - G.cam.y*G.cam.zoom) % gs) + gs) % gs;
  ctx.strokeStyle = dark() ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.05)';
  ctx.lineWidth = 0.5;
  for (let x=offx-gs; x<=W+gs; x+=gs){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y=offy-gs; y<=H+gs; y+=gs){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
}

function draw(){
  ctx.clearRect(0,0,W,H);
  drawTerrain();
  drawGrid();

  if (G.phase==='goal'){
    const gp = G.stones.filter(s=>s.id!==G.lastTouched);
    if (gp.length===2){
      ctx.save();
      ctx.setLineDash([5,5]);
      ctx.strokeStyle = dark() ? 'rgba(255,255,255,0.22)' : 'rgba(0,0,0,0.15)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(wx2sx(gp[0].wx), wy2sy(gp[0].wy));
      ctx.lineTo(wx2sx(gp[1].wx), wy2sy(gp[1].wy));
      ctx.stroke();
      ctx.restore();
    }
  }

  for (const p of G.particles){
    ctx.save(); ctx.globalAlpha = p.life; ctx.fillStyle = p.col;
    ctx.beginPath(); ctx.arc(p.x, p.y, 4*p.life, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
  for (const ft of G.floatTexts){
    ctx.save(); ctx.globalAlpha = ft.life; ctx.fillStyle = ft.col;
    ctx.font = '600 18px system-ui'; ctx.textAlign = 'center';
    ctx.fillText(ft.text, ft.x, ft.y);
    ctx.restore();
  }

  const r = effectiveStoneRadius() * G.cam.zoom;
  for (const s of G.stones){
    const sx = wx2sx(s.wx), sy = wy2sy(s.wy);
    const isLast = s.id === G.lastTouched;
    const isSel = shuffStone && s.id === shuffStone.id;
    const col = isSel ? STONE_COLS[s.id].hi : STONE_COLS[s.id].base;
    ctx.save();
    ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2);
    ctx.fillStyle = col; ctx.fill();
    if (isLast){
      ctx.setLineDash([3,3]);
      ctx.strokeStyle = dark() ? 'rgba(255,255,255,0.35)' : 'rgba(0,0,0,0.25)';
      ctx.lineWidth = 2; ctx.stroke();
    }
    if (G.phase==='goal' && !isLast && !G.animating){
      ctx.setLineDash([]);
      ctx.strokeStyle = dark() ? 'rgba(255,255,255,0.55)' : 'rgba(0,0,0,0.4)';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(sx, sy, r+6, 0, Math.PI*2); ctx.stroke();
    }
    if (r > 7){
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.font = '600 ' + Math.max(9, Math.round(11*G.cam.zoom)) + 'px system-ui';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(String.fromCharCode(65+s.id), sx, sy);
    }
    ctx.restore();
  }

  if (shuffStone && shuffStart && dragCur){
    const dx = dragCur.x-shuffStart.x, dy = dragCur.y-shuffStart.y, len = Math.hypot(dx,dy);
    if (len > 4){
      const pw = velocityToPower(recentSwipeVelocity());
      const nx = dx/len, ny = dy/len;
      const sx = wx2sx(shuffStone.wx), sy = wy2sy(shuffStone.wy);
      ctx.save();
      ctx.strokeStyle = dark() ? 'rgba(255,255,255,0.55)' : 'rgba(0,0,0,0.45)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.lineTo(sx+nx*pw*6, sy+ny*pw*6);
      ctx.moveTo(sx+nx*pw*6-ny*5, sy+ny*pw*6+nx*5);
      ctx.lineTo(sx+nx*pw*6, sy+ny*pw*6);
      ctx.lineTo(sx+nx*pw*6+ny*5, sy+ny*pw*6-nx*5);
      ctx.stroke();
      ctx.restore();
    }
  }

  if (G.cam.zoom < BASE_ZOOM * 0.7 && !G.gameOver){
    ctx.save();
    ctx.fillStyle = dark() ? 'rgba(255,255,255,0.4)' : 'rgba(0,0,0,0.35)';
    ctx.font = '500 11px system-ui';
    ctx.textAlign = 'right';
    ctx.fillText('Spreading out…', W-10, 18);
    ctx.restore();
  }
}

function restartGame(){
  initGame();
  draw();
}

restartGame();
</script>
